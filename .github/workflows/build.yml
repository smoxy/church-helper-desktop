name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # shared-key: riusa la cache scaldata dal job warm-release-cache di
      # ci.yml su main (i tag possono leggere solo cache del default branch).
      # save-if: su tag il salvataggio e' inutile (nessuna run futura puo'
      # leggere cache create su un tag).
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri'
          shared-key: release-windows
          save-if: ${{ !startsWith(github.ref, 'refs/tags/') }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Update version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          # Il tag e' l'unica fonte di verita' per la versione rilasciata:
          # formati ammessi: vX.Y.Z (stabile) o vX.Y.Z-rcN (release
          # candidate, N intero >= 1, es. v1.2.3-rc1). Tutto il resto
          # fa fallire subito la release con un errore chiaro invece di
          # produrre artefatti con versione ambigua.
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc[1-9][0-9]*)?$ ]]; then
            echo "::error::Tag '$TAG' non e' valido. Formati ammessi: vX.Y.Z (release stabile) oppure vX.Y.Z-rcN (release candidate, N>=1), es. v1.2.3 o v1.2.3-rc1. Interrompo la release."
            exit 1
          fi

          if [[ "$TAG" == *-rc* ]]; then
            IS_RC=true
          else
            IS_RC=false
          fi

          # Vincolo di branch: le rc sono ammesse solo su commit non ancora
          # su main, le stabili solo su commit gia' contenuti in main.
          # Richiede fetch-depth: 0 nel checkout per avere storia
          # sufficiente al merge-base.
          git fetch origin main --quiet
          if git merge-base --is-ancestor HEAD origin/main; then
            ON_MAIN=true
          else
            ON_MAIN=false
          fi

          if [ "$IS_RC" = true ] && [ "$ON_MAIN" = true ]; then
            echo "::error::Tag '$TAG' e' una release candidate ma il commit taggato e' gia' contenuto in main. Le rc sono ammesse solo su commit non ancora mergiati in main. Interrompo la release."
            exit 1
          fi

          if [ "$IS_RC" = false ] && [ "$ON_MAIN" = false ]; then
            echo "::error::Tag '$TAG' e' una release stabile ma il commit taggato non e' contenuto in main. Le release stabili sono ammesse solo su commit gia' presenti in main. Interrompo la release."
            exit 1
          fi

          VERSION=${TAG#v}
          # WiX/MSI (Windows) non accetta un ProductVersion con
          # pre-release: per le rc nei file di versione scriviamo solo la
          # parte X.Y.Z, il tag/release name completo resta quello vero.
          BASE_VERSION=${VERSION%-rc*}

          # Anti-injection: la versione estratta dal tag deve ripassare
          # una regex stretta prima di finire in sed/jq, anche se il
          # pattern del tag sopra la vincola gia'.
          if [[ ! "$BASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Versione '$BASE_VERSION' estratta dal tag '$TAG' non e' un semver X.Y.Z valido. Interrompo la release."
            exit 1
          fi

          if [ "$IS_RC" = true ]; then
            echo "::notice::Tag rc: nei file di versione viene scritta solo la parte $BASE_VERSION (WiX/MSI non accetta prerelease nel ProductVersion). La release GitHub sara' marcata prerelease: non verra' servita dall'auto-update (latest.json ignora le prerelease)."
          fi

          CURRENT=$(jq -r '.version' ./src-tauri/tauri.conf.json)
          if [ "$CURRENT" != "$BASE_VERSION" ]; then
            echo "::warning::Versione committata in tauri.conf.json ($CURRENT) diversa da quella del tag ($BASE_VERSION): vince il tag, i file vengono allineati solo per questa build CI."
          fi
          echo "Updating version to $BASE_VERSION"
          jq --arg v "$BASE_VERSION" '.version = $v' ./src-tauri/tauri.conf.json > tmp.json && mv tmp.json ./src-tauri/tauri.conf.json
          jq --arg v "$BASE_VERSION" '.version = $v' ./package.json > tmp.json && mv tmp.json ./package.json
          sed -i.bak "0,/^version = \".*\"/s//version = \"$BASE_VERSION\"/" ./src-tauri/Cargo.toml && rm -f ./src-tauri/Cargo.toml.bak

      - name: Check updater signing key
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        # Compare via env vars (not interpolating the secret values
        # directly into the script) so their contents are never spliced
        # into shell code.
        env:
          HAS_SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
          HAS_SIGNING_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD != '' }}
        run: |
          if [ "$HAS_SIGNING_KEY" != "true" ]; then
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY non configurato nei secrets del repository: questa release NON includera' artefatti di auto-update firmati (nessun .sig, nessuna voce in latest.json). Vedi UPDATER_SETUP.md per completare il setup. La build degli installer procede comunque normalmente."
            jq '.bundle.createUpdaterArtifacts = false' ./src-tauri/tauri.conf.json > tmp.json && mv tmp.json ./src-tauri/tauri.conf.json
          fi

      # Plain test build when NOT releasing (e.g. manual workflow_dispatch on
      # a branch, no tag): verifies the build works without touching any
      # GitHub Release.
      - name: Build Tauri App (test build, no release)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        env:
          CHURCH_HELPER_API_BASE: ${{ vars.CHURCH_HELPER_API_BASE }}
        run: npm run tauri build -- --target x86_64-pc-windows-msvc

      # Real release build: signs the updater artifacts (if
      # TAURI_SIGNING_PRIVATE_KEY is configured, see the check step above)
      # and publishes every bundle (msi/nsis) plus the merged latest.json
      # updater manifest as assets on the GitHub Release for this tag.
      - name: Build and publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          CHURCH_HELPER_API_BASE: ${{ vars.CHURCH_HELPER_API_BASE }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'church-helper-desktop ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          includeUpdaterJson: true
          args: --target x86_64-pc-windows-msvc

  release-linux:
    # Runs after release-windows so the two jobs never race to merge the
    # same latest.json asset on the same GitHub Release concurrently.
    needs: release-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri'
          shared-key: release-linux
          save-if: ${{ !startsWith(github.ref, 'refs/tags/') }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Update version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          # Il tag e' l'unica fonte di verita' per la versione rilasciata:
          # formati ammessi: vX.Y.Z (stabile) o vX.Y.Z-rcN (release
          # candidate, N intero >= 1, es. v1.2.3-rc1). Tutto il resto
          # fa fallire subito la release con un errore chiaro invece di
          # produrre artefatti con versione ambigua.
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc[1-9][0-9]*)?$ ]]; then
            echo "::error::Tag '$TAG' non e' valido. Formati ammessi: vX.Y.Z (release stabile) oppure vX.Y.Z-rcN (release candidate, N>=1), es. v1.2.3 o v1.2.3-rc1. Interrompo la release."
            exit 1
          fi

          if [[ "$TAG" == *-rc* ]]; then
            IS_RC=true
          else
            IS_RC=false
          fi

          # Vincolo di branch: le rc sono ammesse solo su commit non ancora
          # su main, le stabili solo su commit gia' contenuti in main.
          # Richiede fetch-depth: 0 nel checkout per avere storia
          # sufficiente al merge-base.
          git fetch origin main --quiet
          if git merge-base --is-ancestor HEAD origin/main; then
            ON_MAIN=true
          else
            ON_MAIN=false
          fi

          if [ "$IS_RC" = true ] && [ "$ON_MAIN" = true ]; then
            echo "::error::Tag '$TAG' e' una release candidate ma il commit taggato e' gia' contenuto in main. Le rc sono ammesse solo su commit non ancora mergiati in main. Interrompo la release."
            exit 1
          fi

          if [ "$IS_RC" = false ] && [ "$ON_MAIN" = false ]; then
            echo "::error::Tag '$TAG' e' una release stabile ma il commit taggato non e' contenuto in main. Le release stabili sono ammesse solo su commit gia' presenti in main. Interrompo la release."
            exit 1
          fi

          VERSION=${TAG#v}
          # WiX/MSI (Windows) non accetta un ProductVersion con
          # pre-release: per le rc nei file di versione scriviamo solo la
          # parte X.Y.Z, il tag/release name completo resta quello vero.
          BASE_VERSION=${VERSION%-rc*}

          sudo apt-get install -y jq

          # Anti-injection: la versione estratta dal tag deve ripassare
          # una regex stretta prima di finire in sed/jq, anche se il
          # pattern del tag sopra la vincola gia'.
          if [[ ! "$BASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Versione '$BASE_VERSION' estratta dal tag '$TAG' non e' un semver X.Y.Z valido. Interrompo la release."
            exit 1
          fi

          if [ "$IS_RC" = true ]; then
            echo "::notice::Tag rc: nei file di versione viene scritta solo la parte $BASE_VERSION (WiX/MSI non accetta prerelease nel ProductVersion). La release GitHub sara' marcata prerelease: non verra' servita dall'auto-update (latest.json ignora le prerelease)."
          fi

          CURRENT=$(jq -r '.version' src-tauri/tauri.conf.json)
          if [ "$CURRENT" != "$BASE_VERSION" ]; then
            echo "::warning::Versione committata in tauri.conf.json ($CURRENT) diversa da quella del tag ($BASE_VERSION): vince il tag, i file vengono allineati solo per questa build CI."
          fi
          echo "Updating version to $BASE_VERSION"
          jq --arg v "$BASE_VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          jq --arg v "$BASE_VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
          sed -i.bak "0,/^version = \".*\"/s//version = \"$BASE_VERSION\"/" src-tauri/Cargo.toml && rm -f src-tauri/Cargo.toml.bak

      - name: Check updater signing key
        if: startsWith(github.ref, 'refs/tags/v')
        # Compare via env vars (not interpolating the secret values
        # directly into the script) so their contents are never spliced
        # into shell code.
        env:
          HAS_SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
          HAS_SIGNING_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD != '' }}
        run: |
          if [ "$HAS_SIGNING_KEY" != "true" ]; then
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY non configurato nei secrets del repository: questa release NON includera' artefatti di auto-update firmati (nessun .sig, nessuna voce in latest.json). Vedi UPDATER_SETUP.md per completare il setup. La build degli installer procede comunque normalmente."
            jq '.bundle.createUpdaterArtifacts = false' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          fi

      # Plain test build when NOT releasing (e.g. manual workflow_dispatch on
      # a branch, no tag): verifies the build works without touching any
      # GitHub Release.
      - name: Build Linux Deb (test build, no release)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        env:
          CHURCH_HELPER_API_BASE: ${{ vars.CHURCH_HELPER_API_BASE }}
        run: npm run tauri build -- --bundles deb

      # Real release build: signs the updater artifact (if
      # TAURI_SIGNING_PRIVATE_KEY is configured, see the check step above)
      # and publishes the .deb plus the merged latest.json updater manifest
      # (merged with the Windows job's entries, see `needs:` above) as
      # assets on the GitHub Release for this tag.
      - name: Build and publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          CHURCH_HELPER_API_BASE: ${{ vars.CHURCH_HELPER_API_BASE }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'church-helper-desktop ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          includeUpdaterJson: true
          args: --bundles deb
