name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
           workspaces: './src-tauri'

      - name: Install frontend dependencies
        run: npm ci

      - name: Update version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Updating version to $VERSION"
          jq --arg v "$VERSION" '.version = $v' ./src-tauri/tauri.conf.json > tmp.json && mv tmp.json ./src-tauri/tauri.conf.json

      - name: Check updater signing key
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        # Compare via an env var (not interpolating the secret value
        # directly into the script) so the key's contents are never spliced
        # into shell code.
        env:
          HAS_SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
        run: |
          if [ "$HAS_SIGNING_KEY" != "true" ]; then
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY non configurato nei secrets del repository: questa release NON includera' artefatti di auto-update firmati (nessun .sig, nessuna voce in latest.json). Vedi UPDATER_SETUP.md per completare il setup. La build degli installer procede comunque normalmente."
            jq '.bundle.createUpdaterArtifacts = false' ./src-tauri/tauri.conf.json > tmp.json && mv tmp.json ./src-tauri/tauri.conf.json
          fi

      # Plain test build when NOT releasing (e.g. manual workflow_dispatch on
      # a branch, no tag): verifies the build works without touching any
      # GitHub Release.
      - name: Build Tauri App (test build, no release)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npm run tauri build -- --target x86_64-pc-windows-msvc

      # Real release build: signs the updater artifacts (if
      # TAURI_SIGNING_PRIVATE_KEY is configured, see the check step above)
      # and publishes every bundle (msi/nsis) plus the merged latest.json
      # updater manifest as assets on the GitHub Release for this tag.
      - name: Build and publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'church-helper-desktop ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: --target x86_64-pc-windows-msvc

  release-linux:
    # Runs after release-windows so the two jobs never race to merge the
    # same latest.json asset on the same GitHub Release concurrently.
    needs: release-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
           workspaces: './src-tauri'

      - name: Install frontend dependencies
        run: npm ci

      - name: Update version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Updating version to $VERSION"
          sudo apt-get install -y jq
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json

      - name: Check updater signing key
        if: startsWith(github.ref, 'refs/tags/v')
        # Compare via an env var (not interpolating the secret value
        # directly into the script) so the key's contents are never spliced
        # into shell code.
        env:
          HAS_SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
        run: |
          if [ "$HAS_SIGNING_KEY" != "true" ]; then
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY non configurato nei secrets del repository: questa release NON includera' artefatti di auto-update firmati (nessun .sig, nessuna voce in latest.json). Vedi UPDATER_SETUP.md per completare il setup. La build degli installer procede comunque normalmente."
            jq '.bundle.createUpdaterArtifacts = false' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          fi

      # Plain test build when NOT releasing (e.g. manual workflow_dispatch on
      # a branch, no tag): verifies the build works without touching any
      # GitHub Release.
      - name: Build Linux Deb (test build, no release)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npm run tauri build -- --bundles deb

      # Real release build: signs the updater artifact (if
      # TAURI_SIGNING_PRIVATE_KEY is configured, see the check step above)
      # and publishes the .deb plus the merged latest.json updater manifest
      # (merged with the Windows job's entries, see `needs:` above) as
      # assets on the GitHub Release for this tag.
      - name: Build and publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'church-helper-desktop ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: --bundles deb
